<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#087c49">
  <meta name="description" content="「弓が曲がる」「音程が合わない」「左手が痛い」——バイオリンのリアルな悩み113個に、バイオリニスト・研究マニア・身体専門家の3人がチャット形式で答える解決室です。">
  <title>バイオリンお悩み解決室</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/avatars/room.svg">
  <link rel="apple-touch-icon" href="assets/avatars/violinist.png">
  <link rel="stylesheet" href="styles.css?v=20260722-4">
</head>
<body>
  <main class="app-shell">
    <aside class="library-panel" aria-label="悩み一覧">
      <div class="library-top">
        <p class="eyebrow">Violin Nayami Kaiketsu</p>
        <h1>悩みを選ぶ</h1>
        <div class="search-box">
          <input id="searchInput" type="search" placeholder="悩み・キーワードで検索" autocomplete="off">
        </div>
      </div>

      <div class="chapter-strip" id="chapterStrip" aria-label="カテゴリフィルター"></div>

      <div class="filter-row" aria-label="悩みの定番度フィルター">
        <span class="filter-label">悩みの定番度</span>
        <button class="filter-chip active" type="button" data-tier="all">すべて</button>
        <button class="filter-chip" type="button" data-tier="1">ど定番</button>
        <button class="filter-chip" type="button" data-tier="2">よくある</button>
        <button class="filter-chip" type="button" data-tier="3">ニッチ</button>
      </div>

      <div class="question-count" id="questionCount"></div>
      <div class="question-list" id="questionList"></div>
    </aside>

    <section class="phone-wrap" aria-label="トーク画面">
      <div class="phone">
        <header class="chat-header">
          <button class="icon-button" id="menuButton" type="button" aria-label="悩み一覧を開く" aria-expanded="false">
            <span></span><span></span><span></span>
          </button>
          <div class="header-title">
            <strong id="roomTitle">バイオリンお悩み解決室</strong>
            <small id="roomSub">3人の専門家が順番に答えます</small>
          </div>
        </header>

        <div class="chat-body" id="chatBody" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <script src="data/questions.js?v=20260722-4"></script>
  <script src="app.js?v=20260722-4"></script>
</body>
</html>
